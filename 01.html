<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .bg-cover {
            width: 100000vh;
            height: 10000vh;
            background-size:0px;
            opacity: 1;
            animation: animation2 1s ease 6s infinite;
            background-color: rgb(0, 0, 0);
        }
        body {
            background-color: rgb(0, 0, 0);
            background-image:url('fire.gif');
        }
        .box {
            position: absolute;
            top: 60px;
            left: 100px;
            height: 520px;
            width: 1150px;
            background: rgb(22, 22, 22);
            color: white;
            text-align: center;
            font-size:xx-large;
        }
        span {
            margin: auto;
            padding: 20px;
            line-height:480px;
            animation: animation1 1s ease-out 0s 2;
        }
        @keyframes animation1 {
            0% {
                margin-left: 0px;
            }
            100% {
                margin-left: -150px;
            }
        }
        @keyframes animation2 {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
            100%{
                opacity: 1;
            }
        }
    </style>
    <div class="bg-cover">
        <div class="box">
            <span id="text">还没完</span>
        </div>
    </div>
    <script>
    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    async function runAnimations() {
        await delay(1000);
        document.getElementById("text").innerHTML="更"
        await delay(500);
        document.getElementById("text").innerHTML="更有"
        await delay(500);
        const audio=new Audio('1.mp3')
        audio.play()
        await delay(200);
        document.getElementById("text").innerHTML="巨大"
        await delay(600);
        document.getElementById("text").innerHTML="巨大的"
        await delay(600);
        document.getElementById("text").innerHTML="巨大的阴毛"
    }
    runAnimations();
    </script>
</body>
</html>
